<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Convert Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            --font-serif: 'Newsreader', 'Georgia', 'Times New Roman', serif;
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --bg-glass: rgba(255, 255, 255, 0.72);
            --border-subtle: rgba(0, 0, 0, 0.04);
            --border-default: rgba(0, 0, 0, 0.06);
            --border-strong: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --accent-glow: rgba(0, 125, 250, 0.3);
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --radius-2xl: 28px;
            --radius-full: 980px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 0 4px rgba(0, 125, 250, 0.2);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overscroll-behavior: none; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            line-height: 1.5;
            letter-spacing: -0.01em;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        .ambient-gradient {
            position: fixed; top: -20%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 125, 250, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(0, 200, 200, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(100, 100, 255, 0.04) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .app-shell {
            position: relative; z-index: 1;
            width: 100%; max-width: 560px;
            padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 40px);
            display: flex; flex-direction: column; gap: 18px;
        }

        .profile-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-sm);
        }
        .profile-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0071e3, #5ac8fa);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: #fff; flex-shrink: 0;
        }
        .profile-info { flex: 1; min-width: 0; }
        .profile-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-status { font-size: 11px; color: var(--text-secondary); }
        .profile-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; flex-shrink: 0; }

        .main-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-2xl);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; gap: 18px;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 34px; font-weight: 600; line-height: 1.1;
            letter-spacing: -0.02em; text-align: center;
        }
        .hero-title span {
            background: linear-gradient(135deg, #0071e3, #5ac8fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero-subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; font-weight: 400; }

        .format-chips {
            display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 2px 0;
        }
        .format-chips::-webkit-scrollbar { display: none; }
        .format-chip {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border: none; border-radius: var(--radius-full);
            font-family: var(--font-sans); font-size: 12px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer;
            transition: all 0.25s var(--ease-out-expo);
        }
        .format-chip.active { background: var(--accent); color: #fff; box-shadow: 0 2px 12px var(--accent-glow); }
        .format-chip svg { width: 15px; height: 15px; }

        .upload-area {
            border: 2px dashed var(--border-default);
            border-radius: var(--radius-xl);
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s var(--ease-out-expo);
            background: var(--bg-tertiary);
        }
        .upload-area.drag-over { border-color: var(--accent); background: rgba(0, 125, 250, 0.03); transform: scale(0.98); }
        .upload-area.has-file { border-color: var(--success); border-style: solid; background: rgba(52, 199, 89, 0.04); }
        .upload-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--bg-glass); margin-bottom: 12px;
            transition: all 0.35s var(--ease-spring);
        }
        .upload-area.drag-over .upload-icon { transform: scale(1.1); background: var(--accent); }
        .upload-area.drag-over .upload-icon svg { stroke: #fff; }
        .upload-icon svg { width: 26px; height: 26px; stroke: var(--accent); }
        .upload-title { font-size: 15px; font-weight: 600; }
        .upload-subtitle { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

        .file-row {
            display: none; align-items: center; gap: 10px;
            padding: 12px; background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            animation: fadeSlide 0.35s var(--ease-spring);
        }
        .file-row.visible { display: flex; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .file-row-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .file-row-icon[data-type="pdf"] { background: #fee; color: #d00; }
        .file-row-icon[data-type="excel"] { background: #e8f8e8; color: #1a7a1a; }
        .file-row-icon[data-type="html"] { background: #fff3e0; color: #e65100; }
        .file-row-icon[data-type="epub"] { background: #f3e8ff; color: #6d28d9; }
        .file-row-icon[data-type="image"] { background: #e0f7fa; color: #00838f; }
        .file-row-info { flex: 1; min-width: 0; }
        .file-row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-row-meta { font-size: 10px; color: var(--text-tertiary); }
        .file-row-remove {
            width: 28px; height: 28px; border: none; border-radius: 50%;
            background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .file-row-remove:active { background: rgba(255, 59, 48, 0.1); }

        .btn {
            display: block; width: 100%; padding: 14px;
            border: none; border-radius: var(--radius-full);
            font-family: var(--font-sans); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s var(--ease-out-expo);
            background: var(--accent); color: #fff;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn:not(:disabled):hover { background: var(--accent-hover); box-shadow: var(--shadow-glow); }
        .btn:not(:disabled):active { transform: scale(0.97); }
        .btn-content { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn.loading .btn-icon, .btn.loading .btn-label { display: none; }
        .btn.loading .btn-spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-bar {
            display: none; background: var(--bg-secondary);
            border-radius: var(--radius-lg); padding: 16px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle);
            animation: fadeSlide 0.35s var(--ease-spring);
        }
        .progress-bar.visible { display: block; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .progress-track { height: 5px; background: var(--bg-tertiary); border-radius: var(--radius-full); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #5ac8fa); border-radius: var(--radius-full); width: 0%; transition: width 0.4s var(--ease-out-expo); }

        .result-card {
            display: none; background: var(--bg-secondary);
            border-radius: var(--radius-xl); padding: 28px 20px;
            text-align: center; border: 1px solid rgba(52, 199, 89, 0.3);
            box-shadow: var(--shadow-sm);
            animation: fadeSlide 0.35s var(--ease-spring);
        }
        .result-card.visible { display: block; }
        .result-check { display: inline-flex; width: 52px; height: 52px; border-radius: 50%; background: rgba(52, 199, 89, 0.1); align-items: center; justify-content: center; margin-bottom: 12px; }
        .result-title { font-size: 18px; font-weight: 700; color: var(--success); }
        .result-name { font-size: 12px; color: var(--text-tertiary); margin: 4px 0 16px; }
        .btn-download {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; background: var(--success); color: #fff;
            border-radius: var(--radius-full); text-decoration: none;
            font-weight: 600; font-size: 13px; transition: all 0.3s var(--ease-out-expo);
        }
        .btn-download:hover { box-shadow: 0 4px 20px rgba(52, 199, 89, 0.3); }

        .toast {
            position: fixed; top: calc(var(--safe-top) + 16px); left: 50%;
            transform: translateX(-50%) translateY(-120px); z-index: 999;
            background: var(--text-primary); color: #fff;
            padding: 10px 20px; border-radius: var(--radius-full);
            font-size: 13px; font-weight: 500;
            transition: transform 0.35s var(--ease-spring);
            box-shadow: var(--shadow-lg);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (min-width: 768px) {
            .app-shell { max-width: 520px; padding-top: 32px; }
            .hero-title { font-size: 40px; }
            .main-card { padding: 32px; }
        }
        @media (min-width: 1024px) {
            body { background: #f0f0f2; }
            .app-shell { max-width: 560px; }
        }
    </style>
</head>
<body>
    <div class="ambient-gradient"></div>

    <main class="app-shell">
        <!-- Profile Bar -->
        <div class="profile-bar">
            <div class="profile-avatar" id="profileAvatar">?</div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-status">Ready</div>
            </div>
            <div class="profile-dot"></div>
        </div>

        <!-- Main Card -->
        <div class="main-card">
            <h1 class="hero-title">Convert <span>anything</span></h1>
            <p class="hero-subtitle">Professional document conversion to Word format</p>

            <!-- Format Chips -->
            <div class="format-chips" id="formatChips">
                <button class="format-chip active" data-format="pdf">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> PDF
                </button>
                <button class="format-chip" data-format="excel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg> Excel
                </button>
                <button class="format-chip" data-format="html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> HTML
                </button>
                <button class="format-chip" data-format="epub">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> EPUB
                </button>
                <button class="format-chip" data-format="image">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/></svg> Image
                </button>
            </div>

            <!-- Upload Area -->
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <div class="upload-title">Drag & drop your file</div>
                <div class="upload-subtitle">or click to browse — Max 50 MB</div>
                <input type="file" id="fileInput" hidden>
            </div>

            <!-- File Row -->
            <div class="file-row" id="fileRow">
                <div class="file-row-icon" id="fileRowIcon" data-type="pdf">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div class="file-row-info">
                    <div class="file-row-name" id="fileRowName"></div>
                    <div class="file-row-meta" id="fileRowMeta"></div>
                </div>
                <button class="file-row-remove" id="fileRowRemove">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Convert Button -->
            <button class="btn" id="actionBtn" disabled>
                <span class="btn-content">
                    <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
                    <span class="btn-label">Convert to Word (.docx)</span>
                    <span class="btn-spinner"></span>
                </span>
            </button>
        </div>

        <!-- Progress -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-header"><span>Processing...</span><span id="progressVal">0%</span></div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard">
            <div class="result-check">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="result-title">Conversion Complete</div>
            <div class="result-name" id="resultName"></div>
            <a class="btn-download" id="downloadBtn" href="#" download>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/></svg>
                Download
            </a>
            <p style="font-size:11px;color:var(--text-tertiary);margin-top:10px;" id="botStatus"></p>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const haptic = tg.HapticFeedback;
        const user = tg.initDataUnsafe?.user;

        // Profile
        if (user) {
            document.getElementById('profileAvatar').textContent = (user.first_name || '?')[0].toUpperCase();
            document.getElementById('profileName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        }

        // DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileRow = document.getElementById('fileRow');
        const fileRowName = document.getElementById('fileRowName');
        const fileRowMeta = document.getElementById('fileRowMeta');
        const fileRowIcon = document.getElementById('fileRowIcon');
        const fileRowRemove = document.getElementById('fileRowRemove');
        const actionBtn = document.getElementById('actionBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressVal = document.getElementById('progressVal');
        const resultCard = document.getElementById('resultCard');
        const resultName = document.getElementById('resultName');
        const downloadBtn = document.getElementById('downloadBtn');
        const botStatus = document.getElementById('botStatus');
        const toast = document.getElementById('toast');
        const formatChips = document.querySelectorAll('.format-chip');

        let selectedFile = null, selectedFormat = 'pdf';
        const API_CONVERT = '/api/convert';
        const API_SEND_BOT = '/api/send-to-bot';

        // Format
        formatChips.forEach(c => c.addEventListener('click', () => {
            if (haptic) haptic.impactOccurred('light');
            formatChips.forEach(x => x.classList.remove('active'));
            c.classList.add('active');
            selectedFormat = c.dataset.format;
        }));

        // Upload
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

        function loadFile(f) {
            if (!f) return;
            if (f.size > 50*1024*1024) { showToast('File too large (max 50 MB)'); return; }
            selectedFile = f;
            const ext = f.name.split('.').pop().toLowerCase();
            const map = {pdf:'pdf',xlsx:'excel',xls:'excel',csv:'excel',html:'html',htm:'html',epub:'epub',jpg:'image',jpeg:'image',png:'image',bmp:'image',webp:'image'};
            fileRowIcon.dataset.type = map[ext] || 'pdf';
            fileRowName.textContent = f.name;
            fileRowMeta.textContent = (f.size/1024/1024).toFixed(2)+' MB';
            fileRow.classList.add('visible');
            uploadArea.classList.add('has-file');
            actionBtn.disabled = false;
        }

        fileRowRemove.addEventListener('click', e => { e.stopPropagation(); resetFile(); });
        function resetFile() {
            selectedFile = null; fileRow.classList.remove('visible');
            uploadArea.classList.remove('has-file'); actionBtn.disabled = true;
            fileInput.value = ''; progressBar.classList.remove('visible'); resultCard.classList.remove('visible');
            botStatus.textContent = '';
        }

        function showToast(m) { toast.textContent = m; toast.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 3000); }

        // Convert
        actionBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            if (haptic) haptic.impactOccurred('heavy');
            actionBtn.classList.add('loading'); actionBtn.disabled = true;
            progressBar.classList.add('visible'); resultCard.classList.remove('visible');
            progressFill.style.width = '0%'; progressVal.textContent = '0%';
            botStatus.textContent = '';

            const fd = new FormData(); fd.append('file', selectedFile); fd.append('type', selectedFormat);
            let p = 0;
            const iv = setInterval(() => { p += Math.random()*8+2; if (p>88) p=88; progressFill.style.width = p+'%'; progressVal.textContent = Math.round(p)+'%'; }, 350);

            try {
                const r = await fetch(API_CONVERT, { method:'POST', body:fd });
                clearInterval(iv);
                if (!r.ok) throw new Error((await r.json().catch(()=>({error:'Server error'}))).error || 'Failed');
                progressFill.style.width = '100%'; progressVal.textContent = '100%';
                const blob = await r.blob();
                const url = URL.createObjectURL(blob);
                const name = selectedFile.name.replace(/\.[^.]+$/,'')+'.docx';

                setTimeout(() => {
                    progressBar.classList.remove('visible');
                    resultName.textContent = name; resultCard.classList.add('visible');
                    downloadBtn.href = url; downloadBtn.download = name;
                    actionBtn.classList.remove('loading'); actionBtn.disabled = false;
                    showToast('Conversion complete');
                    if (haptic) haptic.notificationOccurred('success');
                }, 400);

                // Natijani botga yuborish
                if (user?.id) {
                    botStatus.textContent = 'Sending to Telegram...';
                    const fdBot = new FormData();
                    fdBot.append('file', blob, name);
                    fdBot.append('user_id', user.id);
                    try {
                        const rb = await fetch(API_SEND_BOT, { method:'POST', body:fdBot });
                        const db = await rb.json();
                        if (db.success) {
                            botStatus.textContent = '✓ Sent to your Telegram';
                        } else {
                            botStatus.textContent = 'Bot delivery failed. Download here.';
                        }
                    } catch(e) {
                        botStatus.textContent = 'Download below (bot unavailable)';
                    }
                }

            } catch(e) {
                clearInterval(iv); progressBar.classList.remove('visible');
                actionBtn.classList.remove('loading'); actionBtn.disabled = false;
                showToast(e.message || 'Conversion failed');
                if (haptic) haptic.notificationOccurred('error');
            }
        });
    </script>
</body>
</html>
